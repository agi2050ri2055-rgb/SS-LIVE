<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS Life</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F5F3EE;--panel:#FAF9F6;--bubble:#ECE9E1;--accent:#C2673A;--text:#2B2A27;--muted:#8A867C;--line:#E2DED3;}
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;justify-content:center;}
  .app{width:100%;max-width:680px;display:flex;flex-direction:column;height:100vh;}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);flex-shrink:0;}
  .topbar h1{font-family:'Source Serif 4',Georgia,serif;font-size:17px;font-weight:600;margin:0;letter-spacing:0.2px;}
  .topbar .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:8px;transition:background .2s;}
  .topbar .dot.live{background:var(--accent);}
  .icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;border-radius:8px;}
  .icon-btn:hover{background:var(--panel);color:var(--text);}

  .settings-panel{display:none;padding:14px 18px;border-bottom:1px solid var(--line);background:var(--panel);flex-shrink:0;}
  .settings-panel.open{display:block;}
  .row{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--muted);padding:8px 0;}
  .row input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px;}
  select{background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:6px 8px;font-size:12px;font-family:'Inter',sans-serif;max-width:200px;}
  .clear-link{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;margin-top:6px;}

  .chat{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:16px;}
  .msg{max-width:80%;font-size:15px;line-height:1.55;}
  .msg.user{align-self:flex-end;background:var(--bubble);padding:10px 14px;border-radius:16px 16px 4px 16px;}
  .msg.bot{align-self:flex-start;color:var(--text);}
  .msg.bot .label{display:block;font-size:11px;color:var(--accent);font-weight:600;margin-bottom:3px;letter-spacing:0.3px;}
  .msg.interim{opacity:0.5;font-style:italic;}
  .chat::-webkit-scrollbar{width:5px;}
  .chat::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
  .empty-state{margin:auto;text-align:center;color:var(--muted);font-size:14px;padding:40px;}

  .controls{flex-shrink:0;padding:16px 18px 22px;display:flex;align-items:center;justify-content:center;gap:18px;border-top:1px solid var(--line);}
  .mic-btn{width:64px;height:64px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s, background .2s;}
  .mic-btn.listening{animation:pulse 2.2s ease-in-out infinite;}
  .mic-btn.thinking{opacity:0.55;}
  .mic-btn.speaking{animation:talk 1.4s ease-in-out infinite;}
  .mic-btn.stopped{background:var(--bubble);color:var(--muted);}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
  @keyframes talk{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}
  .side-btn{width:46px;height:46px;border-radius:50%;border:1px solid var(--line);background:var(--panel);color:var(--muted);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;}
  .side-btn:disabled{opacity:0.35;cursor:not-allowed;}
  .side-btn:hover:not(:disabled){border-color:var(--accent);color:var(--text);}
  .status-line{text-align:center;font-size:12px;color:var(--muted);padding-bottom:6px;}
  video, canvas{display:none;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1><span class="dot" id="liveDot"></span>SS Life</h1>
    <button class="icon-btn" id="settingsBtn" title="Settings">⚙</button>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="row"><span>Wake word ("Hey SS Life")</span><input type="checkbox" id="wakeToggle"></div>
    <div class="row"><span>Allow interrupting</span><input type="checkbox" id="interruptToggle"></div>
    <div class="row"><span>Natural voice (ElevenLabs)</span><input type="checkbox" id="naturalVoiceToggle"></div>
    <div class="row"><span>Browser voice</span><select id="voiceSelect"></select></div>
    <button class="clear-link" id="clearBtn">Clear memory</button>
  </div>

  <div class="chat" id="transcript">
    <div class="empty-state" id="emptyState">Listening — just start talking</div>
  </div>

  <div class="status-line" id="status">Listening…</div>
  <div class="controls">
    <button class="side-btn" id="lookBtn" title="Look">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/>
        <circle cx="12" cy="12" r="5.5" stroke="currentColor" stroke-width="1.6"/>
        <circle cx="12" cy="12" r="2" fill="currentColor"/>
        <path d="M12 3v3M12 18v3M3 12h3M18 12h3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="mic-btn listening" id="micBtn" title="Mic is on">🎙</button>
    <button class="side-btn" id="stopBtn" title="Stop">✕</button>
  </div>

  <video id="cam" autoplay playsinline></video>
  <canvas id="camCanvas"></canvas>
</div>

<script>
const micBtn=document.getElementById('micBtn'),stopBtn=document.getElementById('stopBtn'),lookBtn=document.getElementById('lookBtn');
const statusEl=document.getElementById('status'),transcriptEl=document.getElementById('transcript'),emptyState=document.getElementById('emptyState');
const liveDot=document.getElementById('liveDot'),settingsBtn=document.getElementById('settingsBtn'),settingsPanel=document.getElementById('settingsPanel');
const wakeToggle=document.getElementById('wakeToggle'),interruptToggle=document.getElementById('interruptToggle');
const naturalVoiceToggle=document.getElementById('naturalVoiceToggle'),voiceSelect=document.getElementById('voiceSelect');
const clearBtn=document.getElementById('clearBtn'),camVideo=document.getElementById('cam'),camCanvas=document.getElementById('camCanvas');

let recognition=null, running=false, botSpeaking=false, awaitingFollowUp=false;
let finalBuffer='', silenceTimer=null, interimBubble=null, currentAudio=null, camStream=null;
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

const WAKE_WORDS=['hey ss life','okay ss life','ok ss life','ss life','hey there','hi there','hello there','hey','hello','hi','yo','sup'].sort((a,b)=>b.length-a.length);
function stripWakeWord(text){
  const lower=text.toLowerCase().trim();
  for(const w of WAKE_WORDS){ if(lower.startsWith(w)) return text.slice(w.length).replace(/^[,:\s]+/,'').trim(); }
  return null;
}

let history = JSON.parse(localStorage.getItem('ss_life_history') || '[]');
function saveHistory(){ localStorage.setItem('ss_life_history', JSON.stringify(history.slice(-30))); }
function renderSavedHistory(){
  if(history.length){ emptyState.remove(); }
  history.forEach(m => addBubble(m.role === 'assistant' ? 'bot' : 'user', m.content));
}
renderSavedHistory();

function setState(state, text){
  micBtn.className = 'mic-btn ' + state;
  liveDot.className = 'dot' + (running ? ' live' : '');
  if(text!==undefined) statusEl.textContent=text;
}
function addBubble(who, text, interim=false){
  if(emptyState.parentNode) emptyState.remove();
  const div=document.createElement('div');
  div.className='msg '+who+(interim?' interim':'');
  div.innerHTML=(who==='bot'?'<span class="label">SS LIFE</span>':'')+text;
  transcriptEl.appendChild(div); transcriptEl.scrollTop=transcriptEl.scrollHeight;
  return div;
}

function populateVoices(){
  const voices=speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en'));
  voiceSelect.innerHTML='';
  voices.forEach((v,i)=>{const o=document.createElement('option');o.value=i;o.textContent=v.name;voiceSelect.appendChild(o);});
  window._voices=voices;
  const preferred=voices.findIndex(v=>/Google US English|Samantha|Aria|Natural/i.test(v.name));
  if(preferred>=0) voiceSelect.value=preferred;
}
speechSynthesis.onvoiceschanged=populateVoices; populateVoices();

async function speak(text){
  if(naturalVoiceToggle.checked){
    try{
      const res=await fetch('/api/speak',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
      if(!res.ok) throw new Error('natural voice failed');
      const blob=await res.blob();
      currentAudio=new Audio(URL.createObjectURL(blob));
      botSpeaking=true; setState('speaking','Speaking…');
      return new Promise(resolve=>{
        currentAudio.onended=()=>{botSpeaking=false;resolve();};
        currentAudio.onerror=()=>{botSpeaking=false;resolve();};
        currentAudio.play();
      });
    }catch(e){}
  }
  return new Promise((resolve)=>{
    const utter=new SpeechSynthesisUtterance(text);
    const voices=window._voices||[]; const idx=parseInt(voiceSelect.value,10);
    if(voices[idx]) utter.voice=voices[idx];
    utter.rate=1.02; utter.pitch=1.0;
    utter.onstart=()=>{botSpeaking=true; setState('speaking','Speaking…');};
    utter.onend=()=>{botSpeaking=false; resolve();};
    utter.onerror=()=>{botSpeaking=false; resolve();};
    speechSynthesis.speak(utter);
  });
}
function stopSpeaking(){ speechSynthesis.cancel(); if(currentAudio){currentAudio.pause();currentAudio.currentTime=0;} botSpeaking=false; }

if('Notification' in window && Notification.permission==='default'){ Notification.requestPermission(); }
function scheduleReminder(message, minutes){
  setTimeout(()=>{
    if('Notification' in window && Notification.permission==='granted'){ new Notification('SS Life reminder', { body: message }); }
    addBubble('bot', 'Reminder: ' + message);
    speak('Hey, reminder: ' + message);
  }, minutes*60000);
}

async function askServer(userText, imageBase64){
  history.push({role:'user',content:userText}); saveHistory();
  setState('thinking','Thinking…');
  try{
    const body={history}; if(imageBase64) body.image=imageBase64;
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||'Server error');
    history.push({role:'assistant',content:data.reply}); saveHistory();
    if(data.action && data.action.type==='set_reminder'){ scheduleReminder(data.action.message, data.action.minutes); }
    return data.reply;
  }catch(err){
    addBubble('bot','Error: '+err.message);
    setState('stopped','Error — keep talking to retry');
    return null;
  }
}

async function ensureCamera(){ if(camStream) return; camStream=await navigator.mediaDevices.getUserMedia({video:true}); camVideo.srcObject=camStream; }
function captureFrame(){
  camCanvas.width=camVideo.videoWidth||640; camCanvas.height=camVideo.videoHeight||480;
  camCanvas.getContext('2d').drawImage(camVideo,0,0,camCanvas.width,camCanvas.height);
  return camCanvas.toDataURL('image/jpeg',0.7).split(',')[1];
}
lookBtn.addEventListener('click', async ()=>{
  try{
    await ensureCamera(); await new Promise(r=>setTimeout(r,300));
    const frame=captureFrame();
    addBubble('user','[showed camera] What do you see?');
    recognition && recognition.stop();
    const reply=await askServer('What do you see right now?', frame);
    if(reply){ addBubble('bot',reply); await speak(reply); }
    if(running){ setState('listening','Listening…'); try{recognition.start();}catch(e){} }
  }catch(e){ addBubble('bot','Could not access camera: '+e.message); }
});

function startRecognition(){
  if(!SpeechRecognition){ setState('stopped',"Browser doesn't support this. Use Chrome/Edge."); return; }
  recognition=new SpeechRecognition();
  recognition.continuous=true; recognition.interimResults=true; recognition.lang='en-US';

  recognition.onresult=(event)=>{
    let interim='';
    for(let i=event.resultIndex;i<event.results.length;i++){
      const chunk=event.results[i][0].transcript;
      if(event.results[i].isFinal) finalBuffer+=chunk+' '; else interim+=chunk;
    }
    if(botSpeaking){
      if(interruptToggle.checked && (interim.trim().split(' ').length>=2 || finalBuffer.trim().split(' ').length>=2)){ stopSpeaking(); }
      else { return; }
    }
    if(interim){
      if(!interimBubble) interimBubble=addBubble('user','',true);
      interimBubble.innerHTML=finalBuffer+interim;
      setState('listening','Listening…');
    }
    clearTimeout(silenceTimer);
    silenceTimer=setTimeout(handleUserDone,1100);
  };
  recognition.onerror=(e)=>{ if(e.error==='no-speech'||e.error==='aborted') return; console.warn(e.error); };
  recognition.onend=()=>{ if(running){ try{recognition.start();}catch(e){} } };
  recognition.start();
  setState(wakeToggle.checked && !awaitingFollowUp ? 'listening' : 'listening', wakeToggle.checked && !awaitingFollowUp ? 'Say "Hey SS Life"' : 'Listening…');
}

async function handleUserDone(){
  let said=finalBuffer.trim(); finalBuffer='';
  if(interimBubble){ interimBubble.remove(); interimBubble=null; }
  if(!said) return;

  if(wakeToggle.checked && !awaitingFollowUp){
    const stripped=stripWakeWord(said);
    if(stripped===null) return;
    said=stripped;
    if(!said){
      addBubble('bot','Yes?'); await speak('Yes?');
      awaitingFollowUp=true; setState('listening','Listening…');
      return;
    }
  }
  awaitingFollowUp=false;

  addBubble('user',said);
  recognition.stop();
  const reply=await askServer(said);
  if(reply){ addBubble('bot',reply); await speak(reply); }
  if(running){
    setState('listening', wakeToggle.checked?'Say "Hey SS Life"':'Listening…');
    try{recognition.start();}catch(e){}
  }
}

function startAll(){
  if(running) return;
  running=true; stopBtn.disabled=false; lookBtn.disabled=false;
  startRecognition();
}
micBtn.addEventListener('click', startAll);
// Start listening automatically, no tap required
window.addEventListener('load', ()=>{ setTimeout(startAll, 300); });
stopBtn.addEventListener('click', ()=>{
  running=false; stopBtn.disabled=true; lookBtn.disabled=true;
  clearTimeout(silenceTimer);
  if(recognition){ recognition.onend=null; recognition.stop(); }
  stopSpeaking();
  setState('stopped','Stopped');
});
settingsBtn.addEventListener('click', ()=>{ settingsPanel.classList.toggle('open'); });
clearBtn.addEventListener('click', ()=>{
  localStorage.removeItem('ss_life_history');
  history=[]; transcriptEl.innerHTML='';
  transcriptEl.appendChild(emptyState);
});
</script>
</body>
</html>
