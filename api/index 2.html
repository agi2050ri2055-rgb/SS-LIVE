<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS Life — Voice Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#000000;--panel:#0a0a0a;--panel-2:#161616;--accent:#3b82f6;--accent-light:#7db3ff;--text:#f2f2f2;--muted:#7a7a7a;--line:#232323;--danger:#f27878;}
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:stretch;justify-content:center;}
  .app{width:100%;max-width:1080px;display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);margin:24px;border:1px solid var(--line);border-radius:18px;overflow:hidden;min-height:calc(100vh - 48px);}
  @media (max-width:820px){.app{grid-template-columns:1fr;margin:0;border-radius:0;min-height:100vh;}}
  .stage,.transcript-col{background:var(--panel);}
  .stage{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 22px;position:relative;overflow-y:auto;}
  .brand{position:absolute;top:20px;left:24px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;letter-spacing:3px;color:var(--muted);}
  .brand b{color:var(--accent-light);}
  .orb-wrap{position:relative;width:190px;height:190px;display:flex;align-items:center;justify-content:center;margin-top:20px;}
  .ring{position:absolute;border-radius:50%;border:1px solid rgba(59,130,246,0.25);}
  .ring.r1{width:190px;height:190px;}
  .ring.r2{width:145px;height:145px;border-color:rgba(59,130,246,0.15);}
  .orb{width:110px;height:110px;border-radius:50%;background:radial-gradient(circle at 35% 30%, #bcd9ff, var(--accent) 45%, #1e40af 100%);box-shadow:0 0 50px rgba(59,130,246,0.55),0 0 100px rgba(59,130,246,0.25);transition:transform .15s ease, box-shadow .3s ease;}
  .orb.listening{animation:pulse 1.6s ease-in-out infinite;}
  .orb.thinking{animation:spinFade 1s ease-in-out infinite;}
  .orb.speaking{animation:talk .25s ease-in-out infinite alternate;}
  .orb.asleep{opacity:0.35;box-shadow:none;}
  @keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 50px rgba(59,130,246,0.55);}50%{transform:scale(1.09);box-shadow:0 0 75px rgba(59,130,246,0.8);}}
  @keyframes talk{0%{transform:scale(1);}100%{transform:scale(1.15);}}
  @keyframes spinFade{0%,100%{opacity:0.5;}50%{opacity:1;}}
  .status{margin-top:18px;font-family:'Space Grotesk',sans-serif;font-size:14px;letter-spacing:0.5px;color:var(--muted);min-height:20px;text-align:center;}
  .controls{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  button{font-family:'Space Grotesk',sans-serif;font-size:12px;letter-spacing:0.5px;padding:10px 16px;border-radius:999px;border:1px solid var(--line);background:var(--panel-2);color:var(--text);cursor:pointer;transition:border-color .2s, transform .1s;}
  button:hover{border-color:var(--accent);}
  button:active{transform:scale(0.97);}
  button.primary{background:var(--accent);color:#fff;border:none;font-weight:600;}
  button.stop{border-color:var(--danger);color:var(--danger);}
  button:disabled{opacity:0.4;cursor:not-allowed;}
  .settings{margin-top:20px;width:100%;max-width:290px;display:flex;flex-direction:column;gap:10px;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:14px;}
  .row{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);}
  .row input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px;}
  select{background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:7px 8px;font-size:12px;font-family:'Inter',sans-serif;}
  .hint{font-size:10.5px;color:var(--muted);text-align:center;margin-top:12px;line-height:1.5;}
  .transcript-col{display:flex;flex-direction:column;}
  .transcript-header{padding:20px 22px 14px;border-bottom:1px solid var(--line);font-family:'Space Grotesk',sans-serif;font-size:13px;letter-spacing:2px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;}
  .transcript-header button{padding:5px 10px;font-size:10px;}
  .transcript{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:12px;}
  .bubble{max-width:88%;padding:11px 14px;border-radius:14px;font-size:14px;line-height:1.5;}
  .bubble.user{align-self:flex-end;background:var(--panel-2);border:1px solid var(--line);border-bottom-right-radius:4px;}
  .bubble.bot{align-self:flex-start;background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.3);border-bottom-left-radius:4px;}
  .bubble .who{display:block;font-size:10px;letter-spacing:1px;color:var(--muted);margin-bottom:4px;font-family:'Space Grotesk',sans-serif;}
  .bubble.interim{opacity:0.55;font-style:italic;}
  .transcript::-webkit-scrollbar{width:6px;}
  .transcript::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
  video, canvas{display:none;}
</style>
</head>
<body>
<div class="app">
  <div class="stage">
    <div class="brand">SS <b>LIFE</b></div>
    <div class="orb-wrap">
      <div class="ring r1"></div><div class="ring r2"></div>
      <div class="orb" id="orb"></div>
    </div>
    <div class="status" id="status">Press Start to begin</div>
    <div class="controls">
      <button class="primary" id="startBtn">Start conversation</button>
      <button class="stop" id="stopBtn" disabled>Stop</button>
      <button id="lookBtn" disabled>👁 Look</button>
    </div>
    <div class="settings">
      <div class="row"><span>Wake word ("Hey SS Life")</span><input type="checkbox" id="wakeToggle"></div>
      <div class="row"><span>Allow interrupting</span><input type="checkbox" id="interruptToggle"></div>
      <div class="row"><span>Natural voice (ElevenLabs)</span><input type="checkbox" id="naturalVoiceToggle"></div>
      <div class="row"><span>Browser voice</span><select id="voiceSelect"></select></div>
    </div>
    <div class="hint">Chrome or Edge required.<br>Camera and mic permission asked once.</div>
    <video id="cam" autoplay playsinline></video>
    <canvas id="camCanvas"></canvas>
  </div>

  <div class="transcript-col">
    <div class="transcript-header">
      <span>LIVE TRANSCRIPT</span>
      <button id="clearBtn">Clear memory</button>
    </div>
    <div class="transcript" id="transcript"></div>
  </div>
</div>

<script>
const orb=document.getElementById('orb'),statusEl=document.getElementById('status'),transcriptEl=document.getElementById('transcript');
const startBtn=document.getElementById('startBtn'),stopBtn=document.getElementById('stopBtn'),lookBtn=document.getElementById('lookBtn');
const wakeToggle=document.getElementById('wakeToggle'),interruptToggle=document.getElementById('interruptToggle');
const naturalVoiceToggle=document.getElementById('naturalVoiceToggle'),voiceSelect=document.getElementById('voiceSelect');
const clearBtn=document.getElementById('clearBtn'),camVideo=document.getElementById('cam'),camCanvas=document.getElementById('camCanvas');

// Any of these said at the START of your sentence will wake it up.
// Add or remove words here — longest phrases are checked first so "hey ss life" wins over just "hey".
const WAKE_WORDS = ['hey ss life','okay ss life','ok ss life','ss life','hey there','hi there','hello there','hey','hello','hi','yo','sup'].sort((a,b)=>b.length-a.length);

function stripWakeWord(text){
  const lower=text.toLowerCase().trim();
  for(const w of WAKE_WORDS){
    if(lower.startsWith(w)){
      return text.slice(w.length).replace(/^[,:\s]+/,'').trim();
    }
  }
  return null;
}

let recognition=null, running=false, botSpeaking=false, awake=true, awaitingFollowUp=false;
let finalBuffer='', silenceTimer=null, interimBubble=null, currentAudio=null, camStream=null;
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

let history = JSON.parse(localStorage.getItem('ss_life_history') || '[]');

function saveHistory(){
  localStorage.setItem('ss_life_history', JSON.stringify(history.slice(-30)));
}
function renderSavedHistory(){
  history.forEach(m => addBubble(m.role === 'assistant' ? 'bot' : 'user', m.content));
}
renderSavedHistory();

function setState(state, text){ orb.className='orb '+state; if(text) statusEl.textContent=text; }
function addBubble(who, text, interim=false){
  const div=document.createElement('div');
  div.className='bubble '+who+(interim?' interim':'');
  div.innerHTML='<span class="who">'+(who==='user'?'YOU':'SS LIFE')+'</span>'+text;
  transcriptEl.appendChild(div); transcriptEl.scrollTop=transcriptEl.scrollHeight;
  return div;
}

// ---------- Voices ----------
function populateVoices(){
  const voices=speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en'));
  voiceSelect.innerHTML='';
  voices.forEach((v,i)=>{const o=document.createElement('option');o.value=i;o.textContent=v.name;voiceSelect.appendChild(o);});
  window._voices=voices;
  const preferred=voices.findIndex(v=>/Google US English|Samantha|Aria|Natural/i.test(v.name));
  if(preferred>=0) voiceSelect.value=preferred;
}
speechSynthesis.onvoiceschanged=populateVoices; populateVoices();

async function speak(text){
  if(naturalVoiceToggle.checked){
    try{
      const res=await fetch('/api/speak',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
      if(!res.ok) throw new Error('natural voice failed');
      const blob=await res.blob();
      const url=URL.createObjectURL(blob);
      currentAudio=new Audio(url);
      botSpeaking=true; setState('speaking','Speaking');
      return new Promise(resolve=>{
        currentAudio.onended=()=>{botSpeaking=false;resolve();};
        currentAudio.onerror=()=>{botSpeaking=false;resolve();};
        currentAudio.play();
      });
    }catch(e){ /* fall back to browser voice below */ }
  }
  return new Promise((resolve)=>{
    const utter=new SpeechSynthesisUtterance(text);
    const voices=window._voices||[]; const idx=parseInt(voiceSelect.value,10);
    if(voices[idx]) utter.voice=voices[idx];
    utter.rate=1.02; utter.pitch=1.0;
    utter.onstart=()=>{botSpeaking=true; setState('speaking','Speaking');};
    utter.onend=()=>{botSpeaking=false; resolve();};
    utter.onerror=()=>{botSpeaking=false; resolve();};
    speechSynthesis.speak(utter);
  });
}
function stopSpeaking(){
  speechSynthesis.cancel();
  if(currentAudio){ currentAudio.pause(); currentAudio.currentTime=0; }
  botSpeaking=false;
}

// ---------- Reminders ----------
if('Notification' in window && Notification.permission==='default'){ Notification.requestPermission(); }
function scheduleReminder(message, minutes){
  setTimeout(()=>{
    if('Notification' in window && Notification.permission==='granted'){
      new Notification('SS Life reminder', { body: message });
    }
    addBubble('bot', 'Reminder: ' + message);
    speak('Hey, reminder: ' + message);
  }, minutes*60000);
}

// ---------- Server call ----------
async function askServer(userText, imageBase64){
  history.push({role:'user',content:userText}); saveHistory();
  setState('thinking','Thinking…');
  try{
    const body={history}; if(imageBase64) body.image=imageBase64;
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||'Server error');
    history.push({role:'assistant',content:data.reply}); saveHistory();
    if(data.action && data.action.type==='set_reminder'){
      scheduleReminder(data.action.message, data.action.minutes);
    }
    return data.reply;
  }catch(err){
    addBubble('bot','Error: '+err.message);
    setState('idle','Error — keep talking to retry');
    return null;
  }
}

// ---------- Camera / Look ----------
async function ensureCamera(){
  if(camStream) return;
  camStream=await navigator.mediaDevices.getUserMedia({video:true});
  camVideo.srcObject=camStream;
}
function captureFrame(){
  camCanvas.width=camVideo.videoWidth||640; camCanvas.height=camVideo.videoHeight||480;
  const ctx=camCanvas.getContext('2d');
  ctx.drawImage(camVideo,0,0,camCanvas.width,camCanvas.height);
  return camCanvas.toDataURL('image/jpeg',0.7).split(',')[1];
}
lookBtn.addEventListener('click', async ()=>{
  try{
    await ensureCamera();
    await new Promise(r=>setTimeout(r,300));
    const frame=captureFrame();
    addBubble('user','[showed camera] What do you see?');
    recognition && recognition.stop();
    const reply=await askServer('What do you see right now?', frame);
    if(reply){ addBubble('bot',reply); await speak(reply); }
    if(running){ setState('listening','Listening…'); try{recognition.start();}catch(e){} }
  }catch(e){
    addBubble('bot','Could not access camera: '+e.message);
  }
});

// ---------- Speech recognition ----------
function startRecognition(){
  if(!SpeechRecognition){ setState('idle',"Browser doesn't support speech recognition. Use Chrome/Edge."); return; }
  recognition=new SpeechRecognition();
  recognition.continuous=true; recognition.interimResults=true; recognition.lang='en-US';

  recognition.onresult=(event)=>{
    let interim='';
    for(let i=event.resultIndex;i<event.results.length;i++){
      const chunk=event.results[i][0].transcript;
      if(event.results[i].isFinal) finalBuffer+=chunk+' '; else interim+=chunk;
    }

    if(botSpeaking){
      if(interruptToggle.checked && (interim.trim().split(' ').length>=2 || finalBuffer.trim().split(' ').length>=2)){
        stopSpeaking();
      } else {
        return;
      }
    }

    if(interim){
      if(!interimBubble) interimBubble=addBubble('user','',true);
      interimBubble.innerHTML='<span class="who">YOU</span>'+finalBuffer+interim;
      setState(awake?'listening':'asleep', awake?'Listening…':'Say "Hey SS Life"');
    }
    clearTimeout(silenceTimer);
    silenceTimer=setTimeout(handleUserDone,1100);
  };

  recognition.onerror=(e)=>{ if(e.error==='no-speech'||e.error==='aborted') return; console.warn(e.error); };
  recognition.onend=()=>{ if(running){ try{recognition.start();}catch(e){} } };
  recognition.start();
  setState(wakeToggle.checked && !awaitingFollowUp ? 'asleep' : 'listening', wakeToggle.checked && !awaitingFollowUp ? 'Say "Hey SS Life"' : 'Listening…');
}

async function handleUserDone(){
  let said=finalBuffer.trim(); finalBuffer='';
  if(interimBubble){ interimBubble.remove(); interimBubble=null; }
  if(!said) return;

  if(wakeToggle.checked && !awaitingFollowUp){
    const stripped=stripWakeWord(said);
    if(stripped===null) return; // no wake word heard, still asleep
    said=stripped;
    if(!said){
      addBubble('bot','Yes?');
      await speak('Yes?');
      awaitingFollowUp=true;
      setState('listening','Listening…');
      return;
    }
  }
  awaitingFollowUp=false;

  addBubble('user',said);
  recognition.stop();
  const reply=await askServer(said);
  if(reply){ addBubble('bot',reply); await speak(reply); }
  if(running){
    setState(wakeToggle.checked?'asleep':'listening', wakeToggle.checked?'Say "Hey SS Life"':'Listening…');
    try{recognition.start();}catch(e){}
  }
}

startBtn.addEventListener('click', ()=>{
  running=true; startBtn.disabled=true; stopBtn.disabled=false; lookBtn.disabled=false;
  startRecognition();
});
stopBtn.addEventListener('click', ()=>{
  running=false; startBtn.disabled=false; stopBtn.disabled=true; lookBtn.disabled=true;
  clearTimeout(silenceTimer);
  if(recognition){ recognition.onend=null; recognition.stop(); }
  stopSpeaking();
  setState('idle','Stopped');
});
clearBtn.addEventListener('click', ()=>{
  localStorage.removeItem('ss_life_history');
  history=[]; transcriptEl.innerHTML='';
  addBubble('bot','Memory cleared.');
});
</script>
</body>
</html>
